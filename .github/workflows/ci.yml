name: CI

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
      - run: npm ci
      - run: npm run lint
      - run: npm run build
      - name: Report size
        run: |
          echo "minified: $(wc -c < octagons-lite.min.js) B"
          echo "gzipped:  $(gzip -9 -c octagons-lite.min.js | wc -c) B"
